name: parking_app
description: "ParkPoint parking timer app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  google_maps_flutter: ^2.6.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/parkpoint_icon2.png"

  # Android adaptive icon
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/parkpoint_icon2.png"

  # iOS requires no transparency
  remove_alpha_ios: true